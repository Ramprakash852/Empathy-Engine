<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Empathy Engine</title>
  <style>
    body { font-family: system-ui; max-width: 700px; margin: 3rem auto; padding: 0 1rem; }
    textarea { width:100%; height:120px; font-size:16px; padding:12px; border-radius:8px; border:1px solid #ccc; }
    button { background:#2B5BA1; color:#fff; border:none; padding:12px 28px;
             border-radius:8px; font-size:16px; cursor:pointer; margin-top:12px; }
    button:hover { background:#1E3A5F; }
    #results { margin-top:2rem; display:none; }
    .emotion-badge { display:inline-block; padding:4px 14px; border-radius:20px;
                     background:#D6E4F7; color:#1E3A5F; font-weight:600; font-size:1.1rem; }
    .bar-wrap { background:#eee; border-radius:8px; height:14px; margin:8px 0; }
    .bar-fill { height:14px; border-radius:8px; background:#2B5BA1; transition:width 0.5s; }
  </style>
</head>
<body>
  <h1>Empathy Engine</h1>
  <p>Type any sentence. The AI will detect emotion and speak it expressively.</p>
  <textarea id="text" placeholder="e.g. I just got promoted! OR I can't believe they did that."></textarea>
  <br>
  <button onclick="run()">Analyze &amp; Speak</button>
  <div id="results">
    <h3>Detected: <span class="emotion-badge" id="emotion-label"></span></h3>
    <p>Confidence: <strong id="confidence"></strong></p>
    <p>Intensity: <strong id="intensity"></strong></p>
    <div class="bar-wrap"><div class="bar-fill" id="intensity-bar"></div></div>
    <audio id="player" controls style="width:100%;margin-top:1rem"></audio>
    <p>Engine Used: <span id="engine"></span></p>
  </div>
  <script>
  async function run() {
    const text = document.getElementById('text').value.trim();
    if (!text) return;
    // 1. Get emotion data
    const ar = await fetch('/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    const data = await ar.json();
    document.getElementById('emotion-label').textContent = data.emotion;
    document.getElementById('confidence').textContent = (data.confidence*100).toFixed(1)+'%';
    document.getElementById('intensity').textContent = (data.intensity*100).toFixed(0)+'%';
    document.getElementById('intensity-bar').style.width = (data.intensity*100)+'%';
    document.getElementById('results').style.display = 'block';
    // 2. Get and play audio
    const sr = await fetch('/speak', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text})
    });
    const engine = sr.headers.get('X-TTS-Engine') || 'unknown';
    const blob = await sr.blob();
    document.getElementById('player').src = URL.createObjectURL(blob);
    document.getElementById('engine').textContent = engine;
    document.getElementById('player').play();
  }
  </script>
</body>
</html>
